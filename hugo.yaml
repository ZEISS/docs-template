languageCode: "en-us"
title: "Specifications"

module:
  imports:
    - path: github.com/imfing/hextra
  mounts:
    - source: static
      target: static
      # NOTE: this keeps compat with previous /static/* URLs
    - source: static
      target: static/static

enableRobotsTXT: true
enableGitInfo: true
enableEmoji: true
enableInlineShortcodes: true
relativeURLs: true

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      footnote: true
      taskList: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - identifier: feedback
      name: Feedback
      url: https://zeiss.ghe.com/cit/feedback
      weight: 20
    - identifier: roadmap
      name: Roadmap
      url: https://zeiss.ghe.com/cit/roadmap
      weight: 20
    - name: Search
      weight: 70
      params:
        type: search
    - name: GitHub
      weight: 80
      url: https://github.com/zeiss/docs-template
      params:
        icon: github

params:
  externalLinkDecoration: true
  description: "Teeny tiny template for documentation."
  highlight:
    copy:
      enable: true
      # hover | always
      display: hover
  imageZoom:
    enable: true
  navbar:
    displayTitle: true
  theme:
    default: system
    displayToggle: true
  footer:
    displayCopyright: true
    displayPoweredBy: false
    width: normal
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  search:
    enable: true
    type: flexsearch
    maxResults: 10
  toc:
    displayTags: true
  editPage:
    enable: true
    base: "https://github.com/zeiss/docs-template/raw/main/content"

permalinks:
  page:
    blog: /blog/:slug

outputs:
  home: [html, llms, markdown]
  section:
    - html
    - markdown
  page:
    - html
    - markdown
  taxonomy:
    - html
  term:
    - html

outputFormats:
  rss:
    mediaType: "application/rss+xml"
    baseName: "feed"
